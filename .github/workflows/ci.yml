name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile || bun install
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run fmt:check
      - run: bun run test
